<!DOCTYPE html>
<html>
<head>

<title>The Hungry Tide</title>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Leaflet Awesome Markers -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.awesome-markers/2.0.4/leaflet.awesome-markers.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.awesome-markers/2.0.4/leaflet.awesome-markers.js"></script>

<style>
#map{
height:600px;
width:100%;
}
</style>

</head>

<body>

<h2>Visualising Narrative Space in The Hungry Tide</h2>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// Create map
var map = L.map('map').setView([22.0, 88.8], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

// Create Layer Groups
var humanLayer = L.layerGroup().addTo(map);
var dolphinLayer = L.layerGroup();
var memoryLayer = L.layerGroup();


// ICONS

// Piya icon
var piyaIcon = L.AwesomeMarkers.icon({
icon: 'flask',
markerColor: 'red',
prefix: 'fa'
});

// Kanai icon
var kanaiIcon = L.AwesomeMarkers.icon({
icon: 'user',
markerColor: 'red',
prefix: 'fa'
});

// Refugee icon
var refugeeIcon = L.AwesomeMarkers.icon({
icon: 'users',
markerColor: 'red',
prefix: 'fa'
});

// Dolphin icon
var dolphinIcon = L.AwesomeMarkers.icon({
icon: 'water',
markerColor: 'blue',
prefix: 'fa'
});

// Memory icon
var memoryIcon = L.AwesomeMarkers.icon({
icon: 'book',
markerColor: 'green',
prefix: 'fa'
});


// HUMAN MIGRATION

L.marker([22.05, 88.95], {icon: refugeeIcon})
.bindPopup("<b>Morichjhapi</b><br>Refugee settlement representing human migration.")
.addTo(humanLayer);


// PIYA ARRIVES IN KOLKATA

L.marker([22.5726, 88.3639], {icon: piyaIcon})
.bindPopup("<b>Piya Roy</b><br>Arrives in Kolkata from Seattle to begin cetacean research.")
.addTo(humanLayer);


// DOLPHIN ECOLOGY

L.marker([21.95, 89.10], {icon: dolphinIcon})
.bindPopup("<b>Irrawaddy Dolphin Zone</b><br>Piya’s research area.")
.addTo(dolphinLayer);


// MEMORY SITE

L.marker([22.05, 88.95], {icon: memoryIcon})
.bindPopup("<b>Morichjhapi (Nirmal's Notebook)</b><br>Historical memory recorded in Nirmal’s writings.")
.addTo(memoryLayer);


// Layer Control

var overlays = {
"Human Migration": humanLayer,
"Dolphin Ecology": dolphinLayer,
"Memory Sites": memoryLayer
};

L.control.layers(null, overlays).addTo(map);

</script>

</body>
</html>
