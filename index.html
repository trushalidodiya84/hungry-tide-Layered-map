<!DOCTYPE html>
<html>
<head>

<title>The Hungry Tide Map</title>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map{
height:600px;
width:100%;
}
</style>

</head>

<body>

<h2>Visualising Narrative Space in The Hungry Tide</h2>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([22.0, 88.8], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

// Create Layer Groups
var humanLayer = L.layerGroup();
var dolphinLayer = L.layerGroup();
var memoryLayer = L.layerGroup();


// HUMAN MIGRATION
L.marker([22.05, 88.95])
.bindPopup("<b>Morichjhapi</b><br>Refugee settlement representing human migration.")
.addTo(humanLayer);


// DOLPHIN ECOLOGY
L.circle([21.95, 89.10],{
radius:2000,
color:"blue"
})
.bindPopup("<b>Irrawaddy Dolphin Zone</b><br>Piya’s research area.")
.addTo(dolphinLayer);


// MEMORY / NARRATIVE SITE
L.marker([22.05, 88.95])
.bindPopup("<b>Morichjhapi (Nirmal's Notebook)</b><br>Historical memory recorded in Nirmal’s writings.")
.addTo(memoryLayer);


// Layer Control
var overlays = {
"Human Migration": humanLayer,
"Dolphin Ecology": dolphinLayer,
"Memory Sites": memoryLayer
};

L.control.layers(null, overlays).addTo(map);
</script>

</body>
</html>
